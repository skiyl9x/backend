name: Cleanup
on:
  delete

jobs:
  prepare:
    runs-on: ubuntu-latest
    environment: cleanup
    steps:
      - name: Test
        run: echo "${{ github.event.ref }}"
      - name: Cleanup GitHub Assets
        env:
          GH_TOKEN: "${{ secrets.GITHUB_TOKEN }}"
          GH_REPO: "${{ github.repository }}"
        run: gh release delete "${{ github.event.ref }}-latest" --cleanup-tag --yes || true
