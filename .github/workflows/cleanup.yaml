name: Cleanup
run-name: Cleanup for ref:${{ github.event.ref }} by @${{ github.actor }}
on:
  delete

permissions:
  contents: write
jobs:
  cleanup:
    runs-on: ubuntu-latest
    environment: cleanup
    steps:
      - name: Test
        run: echo "${{ github.event.ref }}"
      
      - name: Verify Before Deletion
        env:
          GH_TOKEN: "${{ secrets.GITHUB_TOKEN }}"
        run: |
           if gh api repos/${{ github.repository }}/git/ref/heads/${{ github.event.ref }} --silent; then
             echo "::error:: branch ${{ github.event.ref }} exists"
             exit 1
           fi
       
      - name: Cleanup GitHub Assets
        env:
          GH_TOKEN: "${{ secrets.GITHUB_TOKEN }}"
          GH_REPO: "${{ github.repository }}"
        run: gh release delete "${{ github.event.ref }}-latest" --cleanup-tag --yes || true



