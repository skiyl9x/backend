name: Cleanup
run-name: Cleanup for ref:${{ github.event.ref }} by @${{ github.actor }}
on:
  delete

permissions:
  contents: write
jobs:
  prepare:
    runs-on: ubuntu-latest
    environment: cleanup
    steps:
      - name: Test
        run: echo "${{ github.event.ref }}"
      
      - name: Verify Before Deletion
        id: verify
        env:
          GH_TOKEN: "${{ secrets.GITHUB_TOKEN }}"
        run: |
           if gh api repos/${{ github.repository }}/git/ref/heads/${{ github.event.ref }} --silent; then
             echo "branch_exists=true" >> $GITHUB_OUTPUT
           else
             echo "branch_exists=false" >> $GITHUB_OUTPUT
           fi
       
      - name: Cleanup GitHub Assets
        if: steps.verify.outputs.branch_exists == 'false'
        env:
          GH_TOKEN: "${{ secrets.GITHUB_TOKEN }}"
          GH_REPO: "${{ github.repository }}"
        run: gh release delete "${{ github.event.ref }}-latest" --cleanup-tag --yes || true



